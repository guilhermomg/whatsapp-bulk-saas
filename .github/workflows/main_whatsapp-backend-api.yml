# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - whatsapp-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whatsapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/whatsapp_test

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/whatsapp_test

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/whatsapp_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          WHATSAPP_API_URL: https://graph.facebook.com/v21.0
          WHATSAPP_ACCESS_TOKEN: test-token
          WHATSAPP_PHONE_NUMBER_ID: test-phone-id
          WHATSAPP_BUSINESS_ACCOUNT_ID: test-account-id
          WHATSAPP_VERIFY_TOKEN: test-verify-token
          WHATSAPP_WEBHOOK_SECRET: test-webhook-secret
          BREVO_API_KEY: test-brevo-key
          BREVO_SENDER_EMAIL: test@example.com
          BREVO_SENDER_NAME: Test

      - name: Build application
        run: npm run build

      - name: Run Prisma migrations in build
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/whatsapp_test

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            node_modules/
            prisma/
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_506D31DF73F845508440247D92A6D36A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0D77C312CCC14D3E8FC996BFF190F5B9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_544C2CAE4E584055867732A7BCAB7A58 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'whatsapp-backend-api'
          slot-name: 'Production'
          package: .
          startup-command: 'npx prisma migrate deploy && npm start'
          